name: Sync DingerLab from zip

on:
  push:
    paths:
      - 'incoming/*.zip'
      - 'scripts/sync_dingerlab_from_zip.py'
      - '.github/workflows/sync-dingerlab-from-zip.yml'
  workflow_dispatch:
    inputs:
      zip_path:
        description: 'Path to the uploaded zip inside the repo'
        required: false
        default: 'incoming/DingerLab_streamlit_v1.35.zip'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Resolve zip path
        id: zip
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.zip_path }}" ]; then
            ZIP_PATH="${{ github.event.inputs.zip_path }}"
          else
            ZIP_PATH="$(ls -t incoming/*.zip 2>/dev/null | head -n 1 || true)"
          fi

          if [ -z "$ZIP_PATH" ]; then
            echo "No zip file found in incoming/ and no manual zip_path provided."
            exit 1
          fi

          if [ ! -f "$ZIP_PATH" ]; then
            echo "Zip file not found: $ZIP_PATH"
            exit 1
          fi

          echo "Using zip: $ZIP_PATH"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Set up Git config
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run sync script
        run: |
          python scripts/sync_dingerlab_from_zip.py --zip "${{ steps.zip.outputs.zip_path }}"

      - name: Commit synced files
        shell: bash
        run: |
          git add DingerLab.html streamlit_app.py login_wallpaper.png requirements.txt README_streamlit.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          ZIP_NAME="$(basename "${{ steps.zip.outputs.zip_path }}")"
          git commit -m "Sync DingerLab from ${ZIP_NAME}"
          git push
